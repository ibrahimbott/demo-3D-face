<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Isolated 3D Face Avatar</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #202020; /* Dark background matching the theme */
    }
    
    #avatar {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    
    /* Optional testing overlay - hidden by default unless you want a quick play button */
    #test-controls {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
      font-family: sans-serif; display: flex; gap: 10px;
    }
    input[type=file]::-webkit-file-upload-button {
      background: #88ccff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
    }
  </style>

  <!-- Module Maps exactly as required by TalkingHead -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Clean, exact rendering container -->
  <div id="avatar"></div>
  
  <div id="test-controls">
    <button id="test-btn" disabled>Loading Frame...</button>
    <!-- Hidden input for local test files but keeping focus on URL driven approach as requested -->
    <input type="file" id="audio-upload" accept="audio/*" style="display:none;">
    <button id="upload-btn" disabled>Or Upload File</button>
  </div>

  <script type="module">
    // Import the newly created clean API
    import { AvatarController } from "./AvatarController.js";

    // Grab the container
    const node = document.getElementById('avatar');
    
    // Initialize our clean API Controller
    const avatar = new AvatarController();
    
    avatar.initialize(node).then(() => {
        // Enable buttons once loaded
        const btn = document.getElementById('test-btn');
        const uploadBtn = document.getElementById('upload-btn');
        btn.innerText = "Play Dummy Audio URL";
        btn.disabled = false;
        uploadBtn.disabled = false;

        // Dummy Test Link Approach As Requested
        btn.addEventListener('click', () => {
            btn.innerText = "Playing...";
            btn.disabled = true;
            
            // Example dummy URL (replace with actual TTS generation endpoint)
            // Note: In real life you'll pass the URL of your TTS bucket or generation output here.
            // Using a standard free TTS generated file for testing:
            const testAudioUrl = "https://actions.google.com/sounds/v1/speech/test_tone.ogg"; 
            
            avatar.speakFromUrl(testAudioUrl).then(() => {
                btn.innerText = "Play Dummy Audio URL";
                btn.disabled = false;
            });
        });

        // Keeping upload purely for backup convenience
        uploadBtn.addEventListener('click', () => document.getElementById('audio-upload').click());
        document.getElementById('audio-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                 // Even local files can be generated into quick object URLs to test the API method!
                 const localUrl = URL.createObjectURL(file);
                 avatar.speakFromUrl(localUrl);
            }
        });
    });
  </script>
</body>
</html>
